<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozgarSathi | Local Jobs</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        :root { --primary: #2563eb; --bg: #f8fafc; --border: #e2e8f0; --text: #1e293b; --success: #22c55e; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); }
        header { background: white; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; }
        .post-btn { background: var(--primary); color: white; padding: 0.6rem 1.2rem; border-radius: 8px; font-weight: 600; text-decoration: none; font-size: 0.9rem; }
        .hero { background: white; padding: 2rem 5%; border-bottom: 1px solid var(--border); text-align: center; }
        .search-box { max-width: 600px; margin: 0 auto 1.5rem; }
        .search-box input { width: 100%; padding: 1rem; border-radius: 12px; border: 2px solid var(--border); outline: none; font-size: 1rem; }
        .categories { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
        .cat-btn { background: #f1f5f9; border: none; padding: 0.5rem 1rem; border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 600; color: #64748b; }
        .cat-btn.active { background: var(--primary); color: white; }
        .job-grid { padding: 2rem 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
        .job-card { background: white; border: 1px solid var(--border); border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column; transition: 0.2s; }
        .job-card:hover { transform: translateY(-4px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .verified { color: #0ea5e9; font-size: 0.75rem; font-weight: 700; margin-bottom: 0.5rem; }
        .co-name { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem; }
        .loc { font-size: 0.85rem; color: #64748b; margin-bottom: 1rem; }
        .role-card { background: #f8fafc; border: 1px solid var(--border); border-radius: 12px; padding: 1rem; margin-bottom: 0.75rem; }
        .role-title { font-weight: 700; font-size: 0.95rem; margin-bottom: 0.4rem; }
        .badge { font-size: 0.7rem; font-weight: 600; padding: 0.2rem 0.5rem; border-radius: 4px; background: white; border: 1px solid var(--border); margin-right: 5px; }
        .jd { font-size: 0.8rem; color: #475569; margin-top: 0.5rem; border-top: 1px solid #e2e8f0; padding-top: 0.5rem; }
        .call-btn { margin-top: auto; background: var(--success); color: white; text-align: center; padding: 0.8rem; text-decoration: none; border-radius: 10px; font-weight: 700; }
    </style>
</head>
<body>
    <header><a href="index.html" class="logo">RozgarSathi</a><a href="post-job.html" class="post-btn">Post Job FREE</a></header>
    <section class="hero">
        <div class="search-box"><input type="text" id="searchInput" placeholder="Search area, role, or company..."></div>
        <div class="categories">
            <button class="cat-btn active" data-filter="all">All Jobs</button>
            <button class="cat-btn" data-filter="accountant">Accountants</button>
            <button class="cat-btn" data-filter="helper">Helpers</button>
            <button class="cat-btn" data-filter="sales">Sales</button>
        </div>
    </section>
    <div class="job-grid" id="jobBoard"></div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwyUadUReYZIBZmF1dxxGp2tEANZwH7X9lfsz5OSSR9Z2AsVcSjL1UrbPIKiQzCnsvD/exec'; 
    let allJobs = [];

    async function fetchJobs() {
        const board = document.getElementById('jobBoard');
        board.innerHTML = "<p style='text-align:center; grid-column:1/-1; padding:2rem;'>Fetching jobs...</p>";
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            const now = Date.now();
            const week = 7 * 24 * 60 * 60 * 1000;

            allJobs = data.filter(item => {
                const isFresh = (now - new Date(item.Timestamp).getTime()) < week;
                return isFresh && item.Status !== "DELETED";
            }).reverse();

            display(allJobs);
        } catch (e) { board.innerHTML = "<p style='text-align:center; color:red; grid-column:1/-1;'>Connection Error. Please check Script URL.</p>"; }
    }

    function display(list) {
        const board = document.getElementById('jobBoard'); board.innerHTML = "";
        if (list.length === 0) { board.innerHTML = "<p style='text-align:center; grid-column:1/-1;'>No jobs found.</p>"; return; }
        list.forEach(row => {
            let roles = "";
            [1, 2, 3].forEach(i => {
                const r = row[`Role ${i}`];
                if (r && r.trim() !== "") {
                    roles += `<div class="role-card"><div class="role-title">${r}</div><div><span class="badge">💼 ${row['Exp '+i]}</span><span class="badge">💰 ${row['Salary '+i]}</span></div>${row['JD '+i] ? `<div class="jd">${row['JD '+i]}</div>` : ''}</div>`;
                }
            });
            const v = (row.Verified === "TRUE" || row.Verified === true) ? '<div class="verified">🛡️ Verified Business</div>' : '';
            board.innerHTML += `<div class="job-card">${v}<div class="co-name">${row['Company Name']}</div><div class="loc">📍 ${row['Location']}</div><div>${roles}</div><a href="tel:${row['Contact Number']}" class="call-btn">Call to Apply</a></div>`;
        });
    }

    function doFilter() {
        const q = document.getElementById('searchInput').value.toLowerCase();
        const cat = document.querySelector('.cat-btn.active').getAttribute('data-filter').toLowerCase();
        const res = allJobs.filter(r => {
            const text = (r['Company Name']+r['Location']+r['Role 1']+r['Role 2']+r['Role 3']+r['JD 1']+r['JD 2']+r['JD 3']).toLowerCase();
            const mSearch = text.includes(q);
            const mCat = (cat === 'all') || [1,2,3].some(i => r[`Role ${i}`]?.toLowerCase().includes(cat));
            return mSearch && mCat;
        });
        display(res);
    }

    document.getElementById('searchInput').addEventListener('input', doFilter);
    document.querySelectorAll('.cat-btn').forEach(b => b.addEventListener('click', () => {
        document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
        b.classList.add('active'); doFilter();
    }));
    window.onload = fetchJobs;
</script>
</body>
</html>
