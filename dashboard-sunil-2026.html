<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Management | KamNiVaat</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px rgba(0,0,0,0.05); }
        .config-box { background: #eff6ff; border: 2px dashed #2563eb; padding: 20px; border-radius: 15px; margin-bottom: 30px; }
        textarea { width: 100%; padding: 10px; border-radius: 8px; margin-bottom: 10px; font-family: monospace; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.85rem; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        th { background: #f8fafc; color: #64748b; }
        .del-btn { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; padding: 6px 10px; border-radius: 6px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>KamNiVaat Control Panel</h1>
        <div class="config-box">
            <meta name="google-site-verification" content="j3I1Wz_Ec_huvAWYzIh6CAZdJkLt0CL-eoitgro1Bsk" />
            <textarea id="metaStorage" rows="2" placeholder="Paste verification tag here..."></textarea>
            <button onclick="saveMeta()" style="background:#2563eb; color:white; padding:8px 15px; border:none; border-radius:5px; cursor:pointer;">Save Backup</button>
        </div>
        <table id="adminTable">
            <thead><tr><th>Date</th><th>Employer Details</th><th>Job Summary</th><th>Status</th><th>Action</th></tr></thead>
            <tbody id="adminBody"><tr><td colspan="5" style="text-align:center;">Syncing...</td></tr></tbody>
        </table>
    </div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwyUadUReYZIBZmF1dxxGp2tEANZwH7X9lfsz5OSSR9Z2AsVcSjL1UrbPIKiQzCnsvD/exec';
    const pw = prompt("Password:");
    if (pw !== "1234") window.location.href = "index.html";

    window.onload = () => {
        document.getElementById('metaStorage').value = localStorage.getItem('kamnivaat_meta') || "";
        loadData();
    };
    function saveMeta() { localStorage.setItem('kamnivaat_meta', document.getElementById('metaStorage').value); alert("Saved!"); }

    async function loadData() {
        const res = await fetch(scriptURL);
        const data = await res.json();
        const body = document.getElementById('adminBody');
        body.innerHTML = "";
        data.reverse().forEach(row => {
            let roles = "";
            for(let i=1; i<=5; i++) { if(row[`Role ${i}`]) roles += `• ${row[`Role ${i}`]}<br>`; }
            const isDel = row.Status === "DELETED";
            body.innerHTML += `<tr>
                <td>${new Date(row.Timestamp).toLocaleDateString()}</td>
                <td><strong>${row['Company Name'] || 'N/A'}</strong><br>📍 ${row['Location'] || ''}<br>📞 ${row['Contact Number']}</td>
                <td>${roles}</td>
                <td><span style="color:${isDel?'red':'green'}; font-weight:bold;">${row.Status || 'Active'}</span></td>
                <td>${isDel ? '-' : `<button class="del-btn" onclick="hidePost('${row.Timestamp}')">Hide</button>`}</td>
            </tr>`;
        });
    }
    async function hidePost(id) {
        if(!confirm("Hide this?")) return;
        const fd = new FormData(); fd.append('action', 'DELETE'); fd.append('id', id);
        await fetch(scriptURL, { method: 'POST', body: fd }); loadData();
    }
</script>
</body>
</html>
