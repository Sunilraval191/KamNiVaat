<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | RozgarSathi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); }
        h1 { color: #2563eb; font-weight: 800; margin-bottom: 5px; }
        table { width: 100%; border-collapse: collapse; margin-top: 25px; font-size: 13px; }
        th, td { border: 1px solid #e2e8f0; padding: 12px; text-align: left; vertical-align: top; }
        th { background: #f8fafc; color: #64748b; font-weight: 700; text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
        .co-info { font-weight: 700; color: #0f172a; font-size: 14px; display: block; margin-bottom: 4px; }
        .contact-link { color: #2563eb; text-decoration: none; display: block; margin-top: 2px; font-weight: 500; }
        .status-active { color: #22c55e; font-weight: 700; background: #f0fdf4; padding: 4px 8px; border-radius: 6px; display: inline-block; }
        .status-deleted { color: #ef4444; font-weight: 700; background: #fef2f2; padding: 4px 8px; border-radius: 6px; display: inline-block; }
        .del-btn { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-weight: 700; width: 100%; }
        .del-btn:hover { background: #ef4444; color: white; }
        .refresh-btn { background: #2563eb; color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: 700; float: right; }
    </style>
</head>
<body>
    <div class="container">
        <button class="refresh-btn" onclick="loadData()">🔄 Refresh Database</button>
        <h1>RozgarSathi Master Admin</h1>
        <p style="color:#64748b;">Review listings, contact employers, and manage visibility.</p>
        
        <table id="adminTable">
            <thead>
                <tr>
                    <th style="width: 120px;">Date</th>
                    <th>Company & Contact Details</th>
                    <th>Roles</th>
                    <th>Status</th>
                    <th>Action</th>
                </tr>
            </thead>
            <tbody id="adminBody">
                <tr><td colspan="5" style="text-align:center; padding:40px;">Loading database...</td></tr>
            </tbody>
        </table>
    </div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwyUadUReYZIBZmF1dxxGp2tEANZwH7X9lfsz5OSSR9Z2AsVcSjL1UrbPIKiQzCnsvD/exec';
    
    // Security check
    const pw = prompt("Admin Access Password:");
    if (pw !== "1234") { 
        alert("Unauthorized!");
        window.location.href = "index.html";
    }

    async function loadData() {
        const body = document.getElementById('adminBody');
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            body.innerHTML = "";

            data.reverse().forEach(row => {
                const isDeleted = row.Status === "DELETED";
                
                // Track roles posted
                let rolesList = "";
                for(let i=1; i<=5; i++) {
                    if(row[`Role ${i}`]) rolesList += `• ${row[`Role ${i}`]}<br>`;
                }

                const date = new Date(row.Timestamp).toLocaleDateString('en-IN', {
                    day: '2-digit', month: 'short', year: 'numeric'
                });

                body.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td>
                            <span class="co-info">${row['Company Name'] || 'Anonymous'}</span>
                            <span style="color:#64748b;">📍 ${row['Location'] || 'N/A'}</span>
                            <div style="margin-top:8px; border-top:1px solid #f1f5f9; pt-4;">
                                <a href="tel:${row['Contact Number']}" class="contact-link">📞 ${row['Contact Number'] || 'No Number'}</a>
                                ${row['Company Email'] ? `<a href="mailto:${row['Company Email']}" class="contact-link">📧 ${row['Company Email']}</a>` : ''}
                            </div>
                        </td>
                        <td style="color:#475569;">${rolesList || 'No roles specified'}</td>
                        <td>
                            <span class="${isDeleted ? 'status-deleted' : 'status-active'}">
                                ${isDeleted ? 'HIDDEN' : 'LIVE'}
                            </span>
                        </td>
                        <td>
                            ${isDeleted ? '-' : `<button class="del-btn" onclick="hidePost('${row.Timestamp}')">Hide Post</button>`}
                        </td>
                    </tr>
                `;
            });
        } catch (e) {
            body.innerHTML = "<tr><td colspan='5' style='color:red; text-align:center;'>Error! Verify Script URL.</td></tr>";
        }
    }

    async function hidePost(id) {
        if (!confirm("Are you sure? This will remove the post from the public website.")) return;
        const btn = event.target;
        btn.innerText = "...";
        const formData = new FormData();
        formData.append('action', 'DELETE');
        formData.append('id', id);
        await fetch(scriptURL, { method: 'POST', body: formData });
        loadData();
    }

    window.onload = loadData;
</script>
</body>
</html>
