<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RozgarSathi | Local Jobs</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --success: #22c55e;
            --bg: #f8fafc;
            --card: #ffffff;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --verified: #0ea5e9;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.5; }

        /* Header & Navigation */
        header { 
            background: white; 
            padding: 1rem 5%; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 1.5rem; font-weight: 800; color: var(--primary); text-decoration: none; letter-spacing: -0.5px; }
        .post-btn { 
            background: var(--primary); color: white; padding: 0.6rem 1.2rem; 
            border-radius: 8px; font-weight: 600; text-decoration: none; 
            transition: all 0.2s; font-size: 0.9rem;
        }
        .post-btn:hover { background: var(--primary-dark); transform: translateY(-1px); }

        /* Search & Filter Section */
        .hero-filter { 
            background: white; padding: 2rem 5% 1.5rem; 
            border-bottom: 1px solid var(--border);
        }
        .search-container { max-width: 600px; margin: 0 auto 1.5rem; position: relative; }
        .search-container input { 
            width: 100%; padding: 1rem 1.5rem; border-radius: 12px; 
            border: 2px solid var(--border); outline: none; font-size: 1rem;
            transition: border-color 0.2s;
        }
        .search-container input:focus { border-color: var(--primary); }

        .categories { display: flex; justify-content: center; gap: 0.5rem; flex-wrap: wrap; }
        .cat-btn { 
            background: #f1f5f9; border: none; padding: 0.5rem 1rem; 
            border-radius: 20px; cursor: pointer; font-size: 0.85rem; font-weight: 600;
            color: var(--text-muted); transition: all 0.2s;
        }
        .cat-btn.active { background: var(--primary); color: white; }

        /* Job Grid */
        .job-grid { padding: 2rem 5%; display: grid; grid-template-columns: repeat(auto-fill, minmax(340px, 1fr)); gap: 1.5rem; max-width: 1200px; margin: 0 auto; }
        
        .job-card { 
            background: var(--card); border: 1px solid var(--border); 
            border-radius: 16px; padding: 1.5rem; display: flex; flex-direction: column;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        .job-card:hover { transform: translateY(-4px); box-shadow: 0 12px 24px -10px rgba(0,0,0,0.1); }

        .verified-tag { 
            display: inline-flex; align-items: center; gap: 4px; 
            color: var(--verified); font-size: 0.75rem; font-weight: 700; 
            margin-bottom: 0.5rem; text-transform: uppercase;
        }
        .company-name { font-size: 1.25rem; font-weight: 700; color: var(--text-main); margin-bottom: 0.25rem; }
        .location { font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center; gap: 4px; margin-bottom: 1.25rem; }

        /* Roles Styling */
        .role-wrapper { display: flex; flex-direction: column; gap: 0.75rem; margin-bottom: 1.5rem; }
        .role-card { 
            background: #f8fafc; border: 1px solid var(--border); 
            border-radius: 12px; padding: 1rem;
        }
        .role-title { font-weight: 700; font-size: 1rem; color: #0f172a; margin-bottom: 0.5rem; }
        .badge-row { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem; }
        .badge { 
            font-size: 0.7rem; font-weight: 600; padding: 0.25rem 0.6rem; 
            border-radius: 6px; background: white; border: 1px solid var(--border);
        }
        .jd-box { font-size: 0.8rem; color: #475569; line-height: 1.4; border-top: 1px solid #e2e8f0; pt: 0.5rem; margin-top: 0.5rem; padding-top: 0.5rem;}

        .call-btn { 
            margin-top: auto; background: var(--success); color: white; 
            text-align: center; padding: 0.8rem; text-decoration: none; 
            border-radius: 10px; font-weight: 700; font-size: 1rem; transition: opacity 0.2s;
        }
        .call-btn:hover { opacity: 0.9; }

        @media (max-width: 480px) {
            .job-grid { grid-template-columns: 1fr; padding: 1rem; }
            .hero-filter { padding: 1.5rem 1rem; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">RozgarSathi</a>
    <a href="post-job.html" class="post-btn">Post Job FREE</a>
</header>

<section class="hero-filter">
    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Search area, company, or job role...">
    </div>
    <div class="categories">
        <button class="cat-btn active" data-filter="all">All Jobs</button>
        <button class="cat-btn" data-filter="accountant">Accountants</button>
        <button class="cat-btn" data-filter="helper">Helpers</button>
        <button class="cat-btn" data-filter="sales">Sales</button>
    </div>
</section>

<div class="job-grid" id="jobBoard"></div>

<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbxt3s7AwAJoqMSbBHSvaiSSYCqvmzz49VKS2i4FtAhO_opdft9nAwxRuWjwetE3oQGh/exec';
    let allJobs = [];

    async function fetchJobs() {
        const board = document.getElementById('jobBoard');
        board.innerHTML = "<p style='text-align:center; grid-column:1/-1; padding: 3rem; color: #64748b;'>Searching for the best talent in your city...</p>";
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            const expiry = 7 * 24 * 60 * 60 * 1000;
            const now = Date.now();

            allJobs = data.filter(item => {
                const postDate = new Date(item.Timestamp).getTime();
                return (now - postDate) < expiry && item.Status !== "DELETED";
            }).reverse(); // Latest jobs first

            displayJobs(allJobs);
        } catch (e) { 
            board.innerHTML = "<p style='text-align:center; color:#ef4444; grid-column:1/-1;'>Unable to connect. Check your internet.</p>"; 
        }
    }

    function displayJobs(list) {
        const board = document.getElementById('jobBoard'); board.innerHTML = "";
        if (list.length === 0) { 
            board.innerHTML = "<div style='text-align:center; grid-column:1/-1; padding: 3rem;'><p style='font-size: 1.25rem; font-weight: 600;'>No jobs found</p><p style='color: #64748b;'>Try a different search term or category.</p></div>"; 
            return; 
        }
        
        list.forEach(row => {
            let rolesHtml = "";
            [1, 2, 3].forEach(i => {
                const title = row[`Role ${i}`], jd = row[`JD ${i}`];
                if (title && title.toString().trim() !== "") {
                    rolesHtml += `
                        <div class="role-card">
                            <div class="role-title">${title}</div>
                            <div class="badge-row">
                                <span class="badge">💼 ${row[`Exp ${i}`] || 'Fresher'}</span>
                                <span class="badge">💰 ${row[`Salary ${i}`] || 'Best in Market'}</span>
                            </div>
                            ${jd ? `<div class="jd-box">${jd}</div>` : ''}
                        </div>`;
                }
            });

            const isVerified = row.Verified === true || row.Verified === "TRUE";

            board.innerHTML += `
                <div class="job-card">
                    ${isVerified ? '<div class="verified-tag">🛡️ Verified Listing</div>' : ''}
                    <div class="company-name">${row['Company Name']}</div>
                    <div class="location">📍 ${row['Location']}</div>
                    <div class="role-wrapper">${rolesHtml}</div>
                    <a href="tel:${row['Contact Number']}" class="call-btn">Call to Apply</a>
                </div>`;
        });
    }

    function filterMaster() {
        const query = document.getElementById('searchInput').value.toLowerCase();
        const activeCat = document.querySelector('.cat-btn.active').getAttribute('data-filter').toLowerCase();

        const filtered = allJobs.filter(row => {
            const matchSearch = (row['Company Name'] + row['Location'] + row['Role 1'] + row['Role 2'] + row['Role 3'] + row['JD 1'] + row['JD 2'] + row['JD 3']).toLowerCase().includes(query);
            const matchCat = (activeCat === 'all') || [1,2,3].some(i => row[`Role ${i}`]?.toLowerCase().includes(activeCat));
            return matchSearch && matchCat;
        });
        displayJobs(filtered);
    }

    document.getElementById('searchInput').addEventListener('input', filterMaster);
    document.querySelectorAll('.cat-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterMaster();
        });
    });

    window.onload = fetchJobs;
</script>
</body>
</html>
