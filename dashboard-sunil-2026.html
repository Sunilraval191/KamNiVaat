<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | RozgarSathi</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f1f5f9; padding: 20px; color: #1e293b; }
        .container { max-width: 1100px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; border-bottom: 2px solid #e2e8f0; padding-bottom: 15px; }
        h1 { font-size: 1.5rem; color: #2563eb; }
        .back-link { text-decoration: none; color: #64748b; font-weight: 600; font-size: 14px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #f8fafc; text-align: left; padding: 12px; font-size: 13px; color: #64748b; border-bottom: 2px solid #e2e8f0; }
        td { padding: 12px; border-bottom: 1px solid #e2e8f0; font-size: 14px; vertical-align: top; }
        
        .role-tag { display: inline-block; background: #eff6ff; color: #2563eb; padding: 2px 8px; border-radius: 4px; font-size: 12px; font-weight: 600; margin: 2px; }
        .status-badge { padding: 4px 8px; border-radius: 20px; font-size: 11px; font-weight: 700; text-transform: uppercase; }
        .active-st { background: #dcfce7; color: #166534; }
        .deleted-st { background: #fee2e2; color: #991b1b; }
        
        .del-btn { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        .del-btn:hover { background: #dc2626; }
        .del-btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1>RozgarSathi Admin</h1>
        <a href="index.html" class="back-link">← View Website</a>
    </div>

    <table id="adminTable">
        <thead>
            <tr>
                <th>Date</th>
                <th>Company & Location</th>
                <th>Roles Posted</th>
                <th>Status</th>
                <th>Action</th>
            </tr>
        </thead>
        <tbody id="adminBody">
            <tr><td colspan="5" style="text-align:center; padding:40px;">Loading database...</td></tr>
        </tbody>
    </table>
</div>

<script>
    // USE THE EXACT SAME SCRIPT URL AS YOUR INDEX.HTML
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwyUadUReYZIBZmF1dxxGp2tEANZwH7X9lfsz5OSSR9Z2AsVcSjL1UrbPIKiQzCnsvD/exec';

    async function loadAdminData() {
        const body = document.getElementById('adminBody');
        try {
            const response = await fetch(scriptURL);
            const data = await response.json();
            body.innerHTML = "";

            // Show newest posts at the top
            data.reverse().forEach(row => {
                const date = new Date(row.Timestamp).toLocaleDateString();
                const isDeleted = row.Status === "DELETED";
                
                // Collect all roles into tags
                let rolesTags = "";
                [1, 2, 3].forEach(i => {
                    if (row[`Role ${i}`] && row[`Role ${i}`].trim() !== "") {
                        rolesTags += `<span class="role-tag">${row[`Role ${i}`]}</span>`;
                    }
                });

                body.innerHTML += `
                    <tr>
                        <td>${date}</td>
                        <td>
                            <strong>${row['Company Name']}</strong><br>
                            <span style="color:#64748b; font-size:12px;">📍 ${row['Location']}</span>
                        </td>
                        <td>${rolesTags}</td>
                        <td>
                            <span class="status-badge ${isDeleted ? 'deleted-st' : 'active-st'}">
                                ${isDeleted ? 'Hidden' : 'Live'}
                            </span>
                        </td>
                        <td>
                            ${isDeleted ? '-' : `<button class="del-btn" onclick="deleteEntry('${row.Timestamp}', this)">Hide Post</button>`}
                        </td>
                    </tr>`;
            });
        } catch (e) {
            body.innerHTML = "<tr><td colspan='5' style='text-align:center; color:red;'>Error loading data. Check Script URL.</td></tr>";
        }
    }

    async function deleteEntry(timestamp, button) {
        if (!confirm("Are you sure you want to hide this job post from the public website?")) return;
        
        button.disabled = true;
        button.innerText = "Hiding...";

        const formData = new FormData();
        formData.append('action', 'DELETE');
        formData.append('id', timestamp);

        try {
            await fetch(scriptURL, { method: 'POST', body: formData });
            alert("Post has been hidden.");
            loadAdminData(); // Refresh the list
        } catch (e) {
            alert("Error: Could not hide post.");
            button.disabled = false;
            button.innerText = "Hide Post";
        }
    }

    window.onload = loadAdminData;
</script>

</body>
</html>
