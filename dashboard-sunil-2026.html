<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="robots" content="noindex, nofollow">
    <title>Admin Control | KamNiVaat</title>
    <style>
        body { font-family: sans-serif; background: #f1f5f9; padding: 20px; }
        .c { max-width: 1200px; margin: 0 auto; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .config { background: #eff6ff; padding: 15px; border-radius: 10px; margin-bottom: 25px; border: 1px dashed #2563eb; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 13px; }
        th, td { border: 1px solid #e2e8f0; padding: 10px; text-align: left; }
        th { background: #f8fafc; color: #475569; }
        .del-btn { background: #fee2e2; color: #ef4444; border: 1px solid #fecaca; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="c">
        <h1>KamNiVaat Control Panel</h1>
        <div class="config">
            <strong>SEO Tag Storage:</strong><br>
            <textarea id="metaStorage" style="width:100%; margin-top:5px;" rows="2"></textarea>
            <button onclick="localStorage.setItem('kamnivaat_meta', document.getElementById('metaStorage').value); alert('Saved!');" style="margin-top:5px; cursor:pointer;">Save Tag Backup</button>
        </div>
        <table id="adminTable">
            <thead><tr><th>Date</th><th>Employer Details</th><th>Interview/Desc</th><th>Jobs</th><th>Action</th></tr></thead>
            <tbody id="adminBody"></tbody>
        </table>
    </div>
<script>
    const scriptURL = 'https://script.google.com/macros/s/AKfycbwyUadUReYZIBZmF1dxxGp2tEANZwH7X9lfsz5OSSR9Z2AsVcSjL1UrbPIKiQzCnsvD/exec';
    const pw = prompt("Password:");
    if (pw !== "1234") window.location.href = "index.html";

    window.onload = () => {
        document.getElementById('metaStorage').value = localStorage.getItem('kamnivaat_meta') || "";
        loadData();
    };

    async function loadData() {
        const res = await fetch(scriptURL);
        const data = await res.json();
        const body = document.getElementById('adminBody');
        body.innerHTML = "";
        data.reverse().forEach(row => {
            let jobs = "";
            for(let i=1; i<=5; i++) { if(row[`Role ${i}`]) jobs += `• ${row[`Role ${i}`]}<br>`; }
            body.innerHTML += `<tr>
                <td>${new Date(row.Timestamp).toLocaleDateString()}</td>
                <td><strong>${row['Company Name']}</strong><br>📞 ${row['Contact Number']}</td>
                <td style="max-width:200px;">${row['Company Desc'] || '-'}</td>
                <td>${jobs}</td>
                <td>${row.Status === 'DELETED' ? 'Hidden' : `<button class="del-btn" onclick="hidePost('${row.Timestamp}')">Hide</button>`}</td>
            </tr>`;
        });
    }
    async function hidePost(id) {
        if(!confirm("Hide this?")) return;
        const fd = new FormData(); fd.append('action', 'DELETE'); fd.append('id', id);
        await fetch(scriptURL, { method: 'POST', body: fd }); loadData();
    }
</script>
</body>
</html>
