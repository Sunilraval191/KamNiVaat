<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post a Job - RozgarSathi</title>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap');

        :root {
            --primary: #2E86C1;
            --bg: #FFFFFF;
            --card-bg: #F5F5F5;
            --text-dark: #333333;
            --border: #E0E0E0;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Roboto', sans-serif;
        }

        body {
            background-color: var(--bg);
            color: var(--text-dark);
        }

        /* Header Styles */
        header {
            background-color: var(--primary);
            color: white;
            padding: 15px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .logo-container a {
            color: white;
            text-decoration: none;
        }

        .post-btn {
            background-color: white;
            color: var(--primary);
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
        }

        /* Form Styles */
        .form-container {
            padding: 40px 5%;
            display: flex;
            justify-content: center;
        }

        .form-box {
            background-color: var(--bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 30px;
            width: 100%;
            max-width: 600px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.05);
        }

        .form-box h2 {
            color: var(--primary);
            margin-bottom: 5px;
        }

        .form-box p {
            color: #666;
            margin-bottom: 25px;
            font-size: 14px;
        }

        .input-group {
            margin-bottom: 15px;
            display: flex;
            flex-direction: column;
        }

        .input-group label {
            font-weight: bold;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .input-group input, 
        .input-group textarea {
            padding: 10px;
            border: 1px solid #CCC;
            border-radius: 4px;
            font-size: 16px;
        }

        .input-group input:focus, 
        .input-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .submit-btn {
            background-color: var(--primary);
            color: white;
            padding: 12px;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            font-weight: bold;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        .submit-btn:hover {
            background-color: #21618C;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <h1><a href="index.html">RozgarSathi</a></h1>
        </div>
        <a href="index.html" class="post-btn">Back to Jobs</a>
    </header>

    <section class="form-container">
        <div class="form-box">
            <h2>Post a Job for Free</h2>
            <p>Fill out the details below. We will review and publish your job ad shortly.</p>
            
            <form action="https://api.web3forms.com/submit" method="POST">
                
                <input type="hidden" name="access_key" value="YOUR_ACCESS_KEY_HERE">

                <div class="input-group">
                    <label>Company/Business Name</label>
                    <input type="text" name="Company Name" placeholder="e.g. Shreeji Enterprises">
                </div>

                <div class="input-group">
                    <label>Job Title</label>
                    <input type="text" name="Job Title" placeholder="e.g. Sr. Accountant">
                </div>

                <div class="input-group">
                    <label>Experience</label>
                    <input type="text" name="Experience" placeholder="e.g. 1-2 Years or Fresher">
                </div>

                <div class="input-group">
                    <label>Monthly Salary (₹)</label>
                    <input type="text" name="Salary" placeholder="e.g. ₹15,000 - ₹20,000">
                </div>

                <div class="input-group">
                    <label>Job Location</label>
                    <input type="text" name="Location" placeholder="e.g. Varachha, Surat">
                </div>

                <div class="input-group">
                    <label>WhatsApp/Contact Number</label>
                    <input type="tel" name="Contact Number" placeholder="e.g. 9876543210">
                </div>

                <div class="input-group">
                    <label>Job Description</label>
                    <textarea name="Description" rows="4" placeholder="Mention any specific skills like Tally, GST, etc."></textarea>
                </div>

                <button type="submit" class="submit-btn">Submit Job For Approval</button>
            </form>
        </div>
    </section>

</body>
</html>
